  name: Packages

  on:
    pull_request:
    push:
      branches: [ main ]

  permissions:
    contents: read
    pull-requests: read

  concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

  jobs:
    changes:
      runs-on: ubuntu-latest
      outputs:
        core: ${{ steps.filter.outputs.core }}
        headless: ${{ steps.filter.outputs.headless }}
        vanilla-dom: ${{ steps.filter.outputs.vanilla-dom }}
        workspace: ${{ steps.filter.outputs.workspace }}
      steps:
        - uses: actions/checkout@v4
        - uses: dorny/paths-filter@v3
          id: filter
          with:
            filters: |
              core:
                - 'packages/core/**'
              headless:
                - 'packages/headless/**'
              vanilla-dom:
                - 'packages/vanilla-dom/**'
              workspace:
                - 'package.json'
                - 'pnpm-lock.yaml'
                - 'pnpm-workspace.yaml'
                - '.github/workflows/**'
                - 'eslint.config.mts'
                - '.prettierrc'

    core:
      needs: changes
      if: needs.changes.outputs.core == 'true' || needs.changes.outputs.workspace == 'true'
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: pnpm/action-setup@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: pnpm

        - run: pnpm install --frozen-lockfile
        - run: pnpm --filter @simplix/core typecheck
        - run: pnpm --filter @simplix/core test
        - run: pnpm --filter @simplix/core build

    headless:
      needs: changes
      if: needs.changes.outputs.headless == 'true' || needs.changes.outputs.workspace == 'true'
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: pnpm/action-setup@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: pnpm

        - run: pnpm install --frozen-lockfile
        - run: pnpm --filter @simplix/headless typecheck
        - run: pnpm --filter @simplix/headless build

    vanilla-dom:
      needs: changes
      if: needs.changes.outputs.vanilla-dom == 'true' || needs.changes.outputs.workspace == 'true'
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: pnpm/action-setup@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: pnpm

        - run: pnpm install --frozen-lockfile
        - run: pnpm --filter @simplix/vanilla-dom typecheck
        - run: pnpm --filter @simplix/vanilla-dom build